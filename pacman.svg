<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">

<style>

svg{
background:#0d1117;
}

.pacman{
animation:move 8s linear infinite;
}

.mouth{
animation:eat .25s infinite alternate;
transform-origin:40px 60px;
}

.ghost{
animation:moveGhost 8s linear infinite;
}

.dot{
animation:blink .5s infinite alternate;
}

@keyframes move{
0%{transform:translateX(-60px);}
100%{transform:translateX(980px);}
}

@keyframes moveGhost{
0%{transform:translateX(-160px);}
100%{transform:translateX(880px);}
}

@keyframes eat{
from{transform:rotate(0deg);}
to{transform:rotate(18deg);}
}

@keyframes blink{
from{opacity:1;}
to{opacity:.3;}
}

</style>

<line x1="0" y1="100" x2="900" y2="100" stroke="#30363d" stroke-width="2"/>

<g>

<circle class="dot" cx="120" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="170" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="220" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="270" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="320" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="370" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="420" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="470" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="520" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="570" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="620" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="670" cy="60" r="4" fill="#FFD43B"/>
<circle class="dot" cx="720" cy="60" r="4" fill="#FFD43B"/>

</g>

<g class="pacman">

<circle cx="40" cy="60" r="28" fill="#FFD43B"/>

<polygon class="mouth"
points="40,60 70,45 70,75"
fill="#0d1117"/>

</g>

<g class="ghost">

<path d="
M40 80
L40 45
Q40 20 65 20
Q90 20 90 45
L90 80
L82 72
L74 80
L66 72
L58 80
L50 72
L40 80
"
fill="#ff4d6d"/>

<circle cx="58" cy="45" r="5" fill="white"/>
<circle cx="74" cy="45" r="5" fill="white"/>

<circle cx="58" cy="45" r="2" fill="#111"/>
<circle cx="74" cy="45" r="2" fill="#111"/>

</g>

<text x="20" y="25"
font-family="monospace"
font-size="18"
fill="#58A6FF">

Pac-Man eats bugs while Rodrigo writes code 👾

</text>

</svg>
